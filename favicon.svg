<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Top-left: teal -->
  <rect x="4" y="4" width="42" height="42" rx="6" fill="#25938f">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="3.2s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <!-- Top-right: heat red -->
  <rect x="54" y="4" width="42" height="42" rx="6" fill="#91272e">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" begin="-1.4s" repeatCount="indefinite"/>
  </rect>
  <!-- Bottom-left: dark ink -->
  <rect x="4" y="54" width="42" height="42" rx="6" fill="#3a2e39">
    <animate attributeName="opacity" values="0.65;1;0.65" dur="3.6s" begin="-2.1s" repeatCount="indefinite"/>
  </rect>
  <!-- Bottom-right: light teal -->
  <rect x="54" y="54" width="42" height="42" rx="6" fill="#cde9e7">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.5s" begin="-0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
